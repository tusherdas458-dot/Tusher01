[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  # Route API requests to Netlify serverless functions
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  # Fallback for React Router / SPA navigation
  from = "/*"
  to = "/index.html"
  status = 200
